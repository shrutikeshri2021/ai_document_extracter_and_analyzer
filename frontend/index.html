<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocAI — Document Analysis</title>
  <style>
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2a2d3e;
      --accent: #7c6af7; --accent2: #5cd9a6;
      --text: #e8e8f0; --muted: #7b7d9d;
      --danger: #f06292; --warn: #ffd54f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }
    header { padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 22px; font-weight: 600; }
    header span { font-size: 13px; color: var(--muted); }
    .badge { background: var(--accent); color: #fff; padding: 2px 10px; border-radius: 99px; font-size: 12px; }
    main { max-width: 900px; margin: 40px auto; padding: 0 24px; }
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 16px; padding: 52px 24px;
      text-align: center; cursor: pointer; transition: all .2s;
      background: var(--card);
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #1e1f35; }
    .upload-zone .icon { font-size: 40px; margin-bottom: 12px; }
    .upload-zone p { color: var(--muted); font-size: 15px; }
    .upload-zone strong { color: var(--accent); }
    #file-input { display: none; }
    .btn {
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity .2s; margin-top: 16px;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .status { margin: 20px 0; padding: 14px 18px; border-radius: 10px; font-size: 14px; display: none; }
    .status.loading { background: #1e2a3a; border: 1px solid #2d4a6e; color: #7ec8fa; display: block; }
    .status.error { background: #2a1a1e; border: 1px solid #5a2030; color: var(--danger); display: block; }
    .results { display: none; }
    .results.visible { display: block; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
    .card h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 12px; }
    .card p { font-size: 15px; line-height: 1.7; color: var(--text); }
    .sentiment-badge {
      display: inline-block; padding: 6px 18px; border-radius: 99px; font-size: 14px; font-weight: 600;
    }
    .sentiment-badge.positive { background: #1a3a2a; color: var(--accent2); }
    .sentiment-badge.negative { background: #3a1a1e; color: var(--danger); }
    .sentiment-badge.neutral  { background: #2a2a1a; color: var(--warn); }
    .entity-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .entity-tag {
      padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: 500;
    }
    .tag-PER, .tag-PERSON { background: #261a3a; color: #b39ddb; }
    .tag-ORG { background: #1a2a3a; color: #81d4fa; }
    .tag-LOC, .tag-GPE { background: #1a3a2a; color: #a5d6a7; }
    .tag-MISC, .tag-DATE, .tag-MONEY { background: #3a2a1a; color: #ffcc80; }
    .entity-tag span.type { font-size: 10px; opacity: .7; margin-left: 4px; }
    .score-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; }
    .score-fill { height: 100%; border-radius: 3px; background: var(--accent2); transition: width 1s ease; }
    .file-info { font-size: 13px; color: var(--muted); margin-top: 10px; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #2d4a6e; border-top-color: #7ec8fa; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<header>
  <div>📄</div>
  <div>
    <h1>DocAI <span class="badge">Live</span></h1>
    <span>AI-Powered Document Analysis & Extraction</span>
  </div>
</header>
<main>
  <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">📁</div>
    <p>Drop your document here or <strong>click to browse</strong></p>
    <p style="margin-top:6px;font-size:13px">Supports PDF, DOCX, PNG, JPG, TIFF</p>
    <input type="file" id="file-input" accept=".pdf,.docx,.doc,.png,.jpg,.jpeg,.tiff,.bmp,.webp"/>
  </div>
  <div id="file-info" class="file-info"></div>
  <button class="btn" id="analyze-btn" disabled onclick="analyzeDoc()">Analyze Document</button>

  <div class="status" id="status"></div>

  <div class="results" id="results">

    <!-- Stats Bar -->
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px" id="stats-bar"></div>

    <!-- Classification + Language Row -->
    <div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap">
      <div class="card" style="flex:1;min-width:200px">
        <h3>📂 Document Type</h3>
        <p id="res-doctype" style="font-size:18px;font-weight:600;color:#7c6af7"></p>
        <p id="res-category" style="font-size:13px;color:#7b7d9d;margin-top:4px"></p>
      </div>
      <div class="card" style="flex:1;min-width:200px">
        <h3>🌐 Language</h3>
        <p id="res-language" style="font-size:18px;font-weight:600;color:#5cd9a6"></p>
      </div>
      <div class="card" style="flex:1;min-width:200px">
        <h3>⏱️ Reading Time</h3>
        <p id="res-readtime" style="font-size:18px;font-weight:600;color:#ffd54f"></p>
      </div>
    </div>

    <!-- Summary -->
    <div class="card">
      <h3>📝 Summary</h3>
      <p id="res-summary"></p>
    </div>

    <!-- Entities + Keywords Row -->
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <div class="card" style="flex:2;min-width:280px">
        <h3>🏷️ Named Entities</h3>
        <div class="entity-list" id="res-entities"></div>
      </div>
      <div class="card" style="flex:1;min-width:200px">
        <h3>🔑 Top Keywords</h3>
        <div id="res-keywords"></div>
      </div>
    </div>

    <!-- Sentiment -->
    <div class="card">
      <h3>💬 Sentiment Analysis</h3>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div id="res-sentiment"></div>
        <div style="flex:1;min-width:200px">
          <div class="score-bar">
            <div class="score-fill" id="res-score-bar" style="width:0%"></div>
          </div>
          <p style="font-size:12px;color:var(--muted);margin-top:6px" id="res-score-text"></p>
        </div>
      </div>
    </div>

    <!-- Extracted Text Preview -->
    <div class="card">
      <h3>📄 Extracted Text Preview</h3>
      <p id="res-preview" style="font-size:13px;color:#7b7d9d;font-family:monospace;white-space:pre-wrap;max-height:150px;overflow-y:auto"></p>
    </div>

  </div>
</main>
<script>
  const API_KEY = "mysecretapikey123";
  const dropZone = document.getElementById("drop-zone");
  const fileInput = document.getElementById("file-input");
  let selectedFile = null;

  fileInput.addEventListener("change", e => setFile(e.target.files[0]));
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault(); dropZone.classList.remove("drag");
    setFile(e.dataTransfer.files[0]);
  });

  function setFile(file) {
    if (!file) return;
    selectedFile = file;
    document.getElementById("file-info").textContent = `Selected: ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
    document.getElementById("analyze-btn").disabled = false;
    document.getElementById("results").classList.remove("visible");
  }

  async function analyzeDoc() {
    if (!selectedFile) return;
    const btn = document.getElementById("analyze-btn");
    const status = document.getElementById("status");
    btn.disabled = true;
    status.className = "status loading";
    status.innerHTML = '<span class="spinner"></span> Extracting text and running AI analysis... (may take 10-20s)';
    document.getElementById("results").classList.remove("visible");

    const form = new FormData();
    form.append("file", selectedFile);

    try {
      const res = await fetch("/analyze", {
        method: "POST",
        headers: { "Authorization": API_KEY },
        body: form
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Unknown error");
      status.style.display = "none";
      renderResults(data);
    } catch(e) {
      status.className = "status error";
      status.textContent = "Error: " + e.message;
    } finally {
      btn.disabled = false;
    }
  }

  function renderResults(data) {
    // Stats bar
    const stats = data.document_stats || {};
    const statsBar = document.getElementById("stats-bar");
    const statItems = [
      ["📊", stats.word_count + " words"],
      ["📃", stats.sentence_count + " sentences"],
      ["🔤", stats.character_count + " chars"],
      ["📋", stats.paragraph_count + " paragraphs"],
      ["📏", stats.avg_words_per_sentence + " avg words/sentence"]
    ];
    statsBar.innerHTML = statItems.map(([icon, val]) =>
      `<div style="background:#1a1d27;border:1px solid #2a2d3e;border-radius:10px;padding:8px 14px;font-size:13px">${icon} ${val}</div>`
    ).join("");

    // Doc type + classification
    const cls = data.document_classification || {};
    document.getElementById("res-doctype").textContent = stats.document_type || "Unknown";
    document.getElementById("res-category").textContent =
      `Category: ${cls.category || "General"} (${Math.round((cls.confidence||0)*100)}% confidence)`;

    // Language
    const lang = data.language || {};
    document.getElementById("res-language").textContent =
      `${lang.language || "English"} (${Math.round((lang.confidence||0.7)*100)}% confidence)`;

    // Reading time
    document.getElementById("res-readtime").textContent =
      `${stats.reading_time_minutes || 1} min read`;

    // Summary
    document.getElementById("res-summary").textContent = data.summary || "No summary generated.";

    // Entities (FIXED display)
    const entDiv = document.getElementById("res-entities");
    entDiv.innerHTML = "";
    const colorMap = {
      PER:"#261a3a|#b39ddb", PERSON:"#261a3a|#b39ddb",
      ORG:"#1a2a3a|#81d4fa", LOC:"#1a3a2a|#a5d6a7", GPE:"#1a3a2a|#a5d6a7",
      MISC:"#3a2a1a|#ffcc80", DATE:"#1a1a3a|#ce93d8", MONEY:"#1a3a1a|#80cbc4",
      EMAIL:"#3a1a2a|#f48fb1", PHONE:"#2a1a3a|#9fa8da", PERCENT:"#3a3a1a|#fff176",
      URL:"#1a2a2a|#80deea"
    };
    if (data.entities && data.entities.length > 0) {
      data.entities.forEach(e => {
        const colors = (colorMap[e.label] || "2a2a2a|#e0e0e0").split("|");
        const tag = document.createElement("span");
        tag.style.cssText = `background:${colors[0]};color:${colors[1]};padding:4px 12px;border-radius:8px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px`;
        tag.innerHTML = `${e.text} <span style="font-size:10px;opacity:0.7">${e.label}</span>`;
        entDiv.appendChild(tag);
      });
    } else {
      entDiv.innerHTML = '<span style="color:#7b7d9d;font-size:13px">No entities detected in this document</span>';
    }

    // Keywords
    const kwDiv = document.getElementById("res-keywords");
    kwDiv.innerHTML = "";
    if (data.keywords && data.keywords.length > 0) {
      data.keywords.forEach(kw => {
        const maxCount = data.keywords[0].count;
        const pct = Math.round((kw.count / maxCount) * 100);
        kwDiv.innerHTML += `
          <div style="margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
              <span>${kw.word}</span><span style="color:#7b7d9d">${kw.count}x</span>
            </div>
            <div style="height:4px;background:#2a2d3e;border-radius:2px">
              <div style="height:100%;width:${pct}%;background:#7c6af7;border-radius:2px"></div>
            </div>
          </div>`;
      });
    }

    // Sentiment (FIXED)
    const s = data.sentiment || {label:"neutral",score:0.5};
    const sentColorMap = {positive:"#1a3a2a|#5cd9a6", negative:"#3a1a1e|#f06292", neutral:"#2a2a1a|#ffd54f"};
    const sentColors = (sentColorMap[s.label] || sentColorMap.neutral).split("|");
    document.getElementById("res-sentiment").innerHTML =
      `<span style="background:${sentColors[0]};color:${sentColors[1]};padding:8px 20px;border-radius:99px;font-size:16px;font-weight:700">${s.label.toUpperCase()}</span>`;
    const pct = Math.round(s.score * 100);
    setTimeout(() => {
      document.getElementById("res-score-bar").style.width = pct + "%";
      document.getElementById("res-score-bar").style.background = sentColors[1];
    }, 100);
    document.getElementById("res-score-text").textContent = `Confidence: ${pct}%`;

    // Text preview
    document.getElementById("res-preview").textContent =
      data.extracted_text_preview || "No preview available";

    document.getElementById("results").classList.add("visible");
  }
</script>
</body>
</html>
